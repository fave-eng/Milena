<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Integration Test — Milena</title><style>body{font-family:Inter,Arial,sans-serif;background:#f1f5f9;padding:24px;color:#0f172a}.page{max-width:780px;margin:auto}.card{background:white;border:1px solid #e2e8f0;border-radius:18px;padding:22px;margin:14px 0}button{border:0;border-radius:12px;padding:12px 16px;background:#4f46e5;color:white;font-weight:800;margin:6px;cursor:pointer}.ok{color:#065f46;background:#d1fae5;padding:10px;border-radius:10px}.err{color:#9f1239;background:#ffe4e6;padding:10px;border-radius:10px}pre{white-space:pre-wrap;background:#0f172a;color:white;padding:14px;border-radius:12px}</style></head><body><div class="page"><h1>🧪 Test integrations — Milena</h1><p>Эту страницу используй только для проверки. Ученице её не давать.</p><div class="card"><h2>1. Supabase read</h2><button onclick="readProgress()">Проверить чтение progress</button><div id="readStatus"></div></div><div class="card"><h2>2. Supabase write</h2><button onclick="writeTest()">Записать тестовый progress</button><div id="writeStatus"></div></div><div class="card"><h2>3. Telegram report</h2><button onclick="sendTestTelegram()">Отправить тестовый Telegram</button><div id="tgStatus"></div></div><div class="card"><h2>Log</h2><pre id="log">—</pre></div></div><script src="config.js"></script><script>
const C=window.APP_CONFIG,api=C.SB_URL+'/rest/v1',headers={apikey:C.SB_KEY,Authorization:'Bearer '+C.SB_KEY,'Content-Type':'application/json'};function out(id,type,msg){document.getElementById(id).innerHTML=`<div class="${type}">${msg}</div>`}function log(x){document.getElementById('log').textContent=typeof x==='string'?x:JSON.stringify(x,null,2)}
async function readProgress(){try{const r=await fetch(`${api}/progress?student=eq.${C.STUDENT}&select=*`,{headers});const d=await r.json();if(!r.ok)throw new Error(JSON.stringify(d));out('readStatus','ok','Supabase читается ✅');log(d)}catch(e){out('readStatus','err','Ошибка чтения ❌ '+e.message);log(e.stack||e.message)}}
async function writeTest(){try{const payload={student:C.STUDENT,updated_at:new Date().toISOString()};const r=await fetch(`${api}/progress?on_conflict=student`,{method:'POST',headers:{...headers,Prefer:'resolution=merge-duplicates,return=representation'},body:JSON.stringify(payload)});const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(JSON.stringify(d));out('writeStatus','ok','Запись в Supabase работает ✅');log(d)}catch(e){out('writeStatus','err','Ошибка записи ❌ '+e.message);log(e.stack||e.message)}}
async function sendTestTelegram(){try{const text=`🧪 Test message from Milena site\n${new Date().toLocaleString()}`;const r=await fetch(`https://api.telegram.org/bot${C.BOT_TOKEN}/sendMessage`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:C.CHAT_ID,text})});const d=await r.json().catch(()=>({}));if(!r.ok||!d.ok)throw new Error(JSON.stringify(d));out('tgStatus','ok','Telegram отправляется ✅');log(d)}catch(e){out('tgStatus','err','Ошибка Telegram ❌ '+e.message);log(e.stack||e.message)}}
</script></body></html>
