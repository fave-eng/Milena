<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Publish Homework — Milena</title><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"><style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--indigo:#4f46e5;--violet:#8b5cf6;--rose:#f43f5e;--emerald:#10b981;--amber:#f59e0b;--sky:#0ea5e9;--dark:#0f172a;--bg:#f1f5f9;--card:#fff;--text:#0f172a;--muted:#64748b;--border:#e2e8f0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:110px}.page{max-width:760px;margin:0 auto;padding:0 20px}.hero{background:linear-gradient(135deg,#0ea5e9 0%,#4f46e5 55%,#8b5cf6 100%);padding:44px 24px 58px;position:relative}.hero-dots{position:absolute;inset:0;pointer-events:none;background-image:radial-gradient(circle,rgba(255,255,255,.15) 1px,transparent 1px);background-size:28px 28px}.hero-inner{position:relative;z-index:1}.hero-badge,.hero-back{display:inline-flex;align-items:center;gap:8px;color:#fff;text-decoration:none}.hero-back{color:rgba(255,255,255,.78);font-size:13px;font-weight:700;margin-bottom:18px}.hero-badge{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);font-size:12px;font-weight:800;padding:5px 14px;border-radius:100px;margin-bottom:16px}.hero h1{font-family:'Plus Jakarta Sans',sans-serif;font-size:clamp(28px,6vw,46px);font-weight:800;color:#fff;letter-spacing:-.6px;margin-bottom:8px}.hero p{color:rgba(255,255,255,.8);font-size:15px;line-height:1.5}.hero-wave{display:block;width:100%;line-height:0;background:var(--bg)}.hero-wave svg{display:block;width:100%}.section-gap{margin-top:26px}.section-title{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:28px 0 14px}.card{background:var(--card);border:1.5px solid var(--border);border-radius:20px;box-shadow:0 2px 12px rgba(0,0,0,.05);overflow:hidden;margin-bottom:14px}.card-main{padding:20px 22px;display:flex;gap:16px;align-items:center;text-decoration:none;color:inherit}.icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;background:linear-gradient(135deg,#dbeafe,#ede9fe)}.info{flex:1;min-width:0}.label{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:3px}.title{font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;font-weight:800;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.meta{font-size:12px;color:var(--muted);line-height:1.45}.pill{display:inline-flex;font-size:11px;font-weight:800;border-radius:100px;padding:4px 10px;margin-right:6px}.pill-current{background:#ede9fe;color:#5b21b6}.pill-done{background:#d1fae5;color:#065f46}.pill-locked{background:#f1f5f9;color:#94a3b8}.arrow{font-size:20px;color:var(--indigo)}.strip{border-top:1px solid var(--border);padding:11px 22px;background:#fafbff;display:flex;justify-content:space-between;gap:12px;align-items:center;font-size:13px;color:var(--muted)}.strip a{font-size:12px;font-weight:800;color:var(--rose);text-decoration:none}.stats-row{display:flex;gap:12px;margin:24px 0 28px;flex-wrap:wrap}.stat{background:var(--card);border:1.5px solid var(--border);border-radius:18px;padding:14px 18px;flex:1;min-width:90px;text-align:center}.stat-num{font-family:'Plus Jakarta Sans',sans-serif;font-size:24px;font-weight:800;color:var(--indigo)}.stat-lbl{font-size:11px;color:var(--muted);font-weight:700;margin-top:2px}.progress{background:rgba(255,255,255,.15);height:6px;border-radius:99px;overflow:hidden;margin-top:16px;max-width:360px}.progress>div{height:100%;background:#fff;border-radius:99px;transition:.5s}.nav-pill{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0f172a;border-radius:100px;padding:12px 24px;display:flex;gap:4px;box-shadow:0 8px 32px rgba(15,23,42,.3);z-index:900;white-space:nowrap}.nav-pill a{color:rgba(255,255,255,.6);font-size:12px;font-weight:700;text-decoration:none;padding:6px 14px;border-radius:100px}.nav-pill a:hover,.nav-pill a.active{background:var(--indigo);color:#fff}@media(max-width:560px){.strip{flex-direction:column;align-items:flex-start}.nav-pill{padding:10px 14px}.nav-pill a{padding:6px 9px}}
</style></head><body><div class="hero"><div class="hero-dots"></div><div class="page hero-inner"><a href="./homework.html" class="hero-back">← Homework Board</a><div class="hero-badge">📲 Publish</div><h1>Публикация домашки</h1><p>Добавляет урок в progress.published_homeworks.</p></div></div><div class="page"><div class="section-gap"></div><div class="card"><div style="padding:22px"><div class="label">Номер урока</div><input id="lesson" value="1"><div class="label" style="margin-top:12px">Название</div><input id="title" value="Lesson 1"><div class="label" style="margin-top:12px">Homework URL</div><input id="homeworkUrl" value="lesson1.html"><div class="label" style="margin-top:12px">Vocab URL</div><input id="vocabUrl" value="vocab-lesson1.html"><div class="label" style="margin-top:12px">Vocab title</div><input id="vocabTitle" value="Lesson 1 Vocabulary"><div class="label" style="margin-top:12px">Количество слов</div><input id="vocabTotal" value="0"><button onclick="publish()" style="width:100%;margin-top:18px;padding:15px;border:0;border-radius:14px;background:#4f46e5;color:#fff;font-weight:800">Опубликовать</button><div id="status" class="meta" style="margin-top:12px"></div></div></div></div><div class="nav-pill"><a href="./index.html" class="">🏠 Home</a><a href="./homework.html" class="active">📝 HW</a><a href="./vocabulary-hub.html" class="">💥 Vocab</a></div><script>const SB_URL='https://YOUR_SUPABASE_PROJECT.supabase.co/rest/v1';const SB_KEY='YOUR_SUPABASE_ANON_KEY';const STUDENT='milena';async function loadProgress(){try{const r=await fetch(`${SB_URL}/progress?student=eq.${STUDENT}&select=*`,{headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`}});const d=await r.json();return d&&d[0]?d[0]:{}}catch(e){return {}}}function obj(x){return x&&typeof x==='object'?x:{}}function scoreDone(s){return !!(s&&String(s).trim()&&String(s)!=='0/0')}function pct(a,b){return b?Math.round(a/b*100):0}</script><style>input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:12px;font-family:inherit}</style><script>async function publish(){const p=await loadProgress();const published=obj(p.published_homeworks);const k=document.getElementById('lesson').value.trim();published[k]={lesson:k,title:document.getElementById('title').value.trim(),homework_url:document.getElementById('homeworkUrl').value.trim(),vocab_url:document.getElementById('vocabUrl').value.trim(),vocab_title:document.getElementById('vocabTitle').value.trim(),vocab_total:Number(document.getElementById('vocabTotal').value||0),published:true,published_at:new Date().toISOString()};const r=await fetch(`${SB_URL}/progress?on_conflict=student`,{method:'POST',headers:{'Content-Type':'application/json',apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`,Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({student:STUDENT,published_homeworks:published,updated_at:new Date().toISOString()})});document.getElementById('status').textContent=r.ok?'Готово ✅':'Ошибка сохранения';}</script></body></html>
