<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Vocabulary Hub — Milena</title><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"><style>
*{box-sizing:border-box;margin:0;padding:0}:root{--indigo:#4f46e5;--rose:#f43f5e;--emerald:#10b981;--bg:#f1f5f9;--border:#e2e8f0;--muted:#64748b;--dark:#0f172a}body{font-family:Inter,sans-serif;background:var(--bg);padding-bottom:110px}.hero{background:linear-gradient(135deg,#f43f5e,#ec4899,#8b5cf6);padding:40px 24px 56px;color:white}.page{max-width:760px;margin:0 auto;padding:0 20px}.back{color:rgba(255,255,255,.8);text-decoration:none;font-size:13px;font-weight:700}.badge{display:inline-block;margin-top:18px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);border-radius:100px;padding:6px 14px;font-size:12px;font-weight:800}.hero h1{font-family:'Plus Jakarta Sans';font-size:clamp(28px,5vw,42px);margin-top:14px}.wave{line-height:0;background:var(--bg)}.wave svg{width:100%;display:block}.tracker{background:#0f172a;color:white;border-radius:22px;padding:22px;margin:26px 0}.trow{display:flex;justify-content:space-between;font-size:13px;color:rgba(255,255,255,.7);margin:12px 0 7px}.track{height:7px;background:rgba(255,255,255,.12);border-radius:100px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,#f43f5e,#8b5cf6);width:0}.section{font-size:11px;color:var(--muted);font-weight:800;letter-spacing:2px;text-transform:uppercase;margin:28px 0 14px}.list{display:flex;flex-direction:column;gap:14px}.card{display:block;text-decoration:none;color:inherit;background:white;border:1.5px solid var(--border);border-radius:20px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.05)}.main{padding:18px 20px;display:flex;gap:16px;align-items:center}.icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;background:#fff1f2}.info{flex:1}.lesson{font-size:11px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:1px}.title{font-family:'Plus Jakarta Sans';font-size:17px;font-weight:800;margin:4px 0}.meta{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted)}.bar{flex:1;max-width:130px;background:#e2e8f0;height:6px;border-radius:100px;overflow:hidden}.bar span{display:block;height:100%;background:linear-gradient(90deg,#f43f5e,#8b5cf6)}.empty{background:white;border:1.5px dashed var(--border);border-radius:20px;padding:28px;text-align:center;color:var(--muted)}.nav{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0f172a;border-radius:100px;padding:12px 20px;display:flex;gap:4px}.nav a{color:rgba(255,255,255,.65);font-size:12px;font-weight:700;text-decoration:none;padding:7px 12px;border-radius:100px}.nav a.active,.nav a:hover{background:#4f46e5;color:white}@media(max-width:640px){.nav{padding:10px}.nav a{padding:6px 8px}}
</style></head><body><div class="hero"><div class="page"><a class="back" href="index.html">← На главную</a><br><div class="badge">💥 Vocabulary Hub</div><h1>Vocabulary</h1></div></div><div class="wave"><svg viewBox="0 0 1440 56" preserveAspectRatio="none"><path d="M0,56 C360,0 1080,0 1440,56 L1440,56 L0,56 Z" fill="#f1f5f9"/></svg></div><main class="page"><div class="tracker"><h3>📊 Прогресс словаря</h3><div class="trow"><span>Выучено</span><span id="totalLabel">0 / 0 слов</span></div><div class="track"><div class="fill" id="totalBar"></div></div></div><div class="section">Доступные словари</div><div class="list" id="list"><div class="empty">Загружаю словари…</div></div></main><nav class="nav"><a href="index.html">🏠 Home</a><a href="grammar-hub.html">📖 Grammar</a><a href="homework.html">📝 HW</a><a class="active" href="vocabulary-hub.html">💥 Vocab</a></nav><script src="config.js"></script><script>
const C=window.APP_CONFIG,api=C.SB_URL+'/rest/v1',headers={apikey:C.SB_KEY,Authorization:'Bearer '+C.SB_KEY};
window.addEventListener('load',async()=>{try{const r=await fetch(`${api}/progress?student=eq.${C.STUDENT}&select=published_lessons,vocab_progress`,{headers});const d=(await r.json())[0]||{};const lessons=d.published_lessons||{}, prog=d.vocab_progress||{};const items=Object.entries(lessons).filter(([_,x])=>x&&x.published!==false&&x.vocab_url).sort((a,b)=>Number(a[0])-Number(b[0]));let known=0,total=0;items.forEach(([k,x])=>{known+=Number((prog[k]&&prog[k].known)||prog[k]||0);total+=Number(x.vocab_total||0)});totalLabel.textContent=`${known} / ${total} слов`;totalBar.style.width=(total?Math.round(known/total*100):0)+'%';if(!items.length){list.innerHTML='<div class="empty">Пока нет опубликованных словарей.</div>';return}list.innerHTML=items.map(([k,x])=>{const kn=Number((prog[k]&&prog[k].known)||prog[k]||0), tt=Number(x.vocab_total||0), pc=tt?Math.round(kn/tt*100):0;return `<a class="card" href="${x.vocab_url}"><div class="main"><div class="icon">💥</div><div class="info"><div class="lesson">Lesson ${k}</div><div class="title">${x.vocab_title||x.title||'Vocabulary'}</div><div class="meta"><span>${kn} / ${tt} слов</span><div class="bar"><span style="width:${pc}%"></span></div><b>${pc}%</b></div></div>→</div></a>`}).join('')}catch(e){list.innerHTML='<div class="empty">Не удалось загрузить Supabase. Проверь config.js.</div>'}});
</script></body></html>
