<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Vocabulary Lesson 1 — Milena</title><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"><style>
*{box-sizing:border-box;margin:0;padding:0}:root{--rose:#f43f5e;--indigo:#4f46e5;--emerald:#10b981;--amber:#f59e0b;--bg:#f1f5f9;--border:#e2e8f0;--muted:#64748b}body{font-family:Inter,sans-serif;background:var(--bg);padding-bottom:100px}.hero{background:linear-gradient(135deg,#f43f5e,#8b5cf6);padding:38px 24px 52px;color:white}.page{max-width:760px;margin:0 auto;padding:0 20px}.back{color:rgba(255,255,255,.8);text-decoration:none;font-size:13px;font-weight:700}.hero h1{font-family:'Plus Jakarta Sans';font-size:clamp(26px,5vw,38px);margin-top:14px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:22px 0}.stat{background:white;border:1.5px solid var(--border);border-radius:16px;padding:14px;text-align:center}.num{font-family:'Plus Jakarta Sans';font-size:22px;font-weight:800}.lbl{font-size:11px;color:var(--muted);font-weight:700}.card{background:white;border:1.5px solid var(--border);border-radius:24px;min-height:250px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:28px;margin:18px 0;box-shadow:0 2px 12px rgba(0,0,0,.05)}.word{font-family:'Plus Jakarta Sans';font-size:36px;font-weight:800}.ru{font-size:18px;color:var(--muted);margin-top:8px}.btns{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.btn{border:none;border-radius:14px;padding:14px;font-weight:800;cursor:pointer}.new{background:#ffe4e6;color:#9f1239}.learn{background:#fef3c7;color:#92400e}.known{background:#d1fae5;color:#065f46}.navrow{display:flex;gap:10px;margin-top:12px}.small{flex:1;background:white;border:1.5px solid var(--border);border-radius:12px;padding:12px;font-weight:800}.nav{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0f172a;border-radius:100px;padding:12px 20px;display:flex;gap:4px}.nav a{color:rgba(255,255,255,.65);font-size:12px;font-weight:700;text-decoration:none;padding:7px 12px;border-radius:100px}.nav a.active,.nav a:hover{background:#4f46e5;color:white}@media(max-width:640px){.stats,.btns{grid-template-columns:1fr}.nav{padding:10px}.nav a{padding:6px 8px}}
</style></head><body><div class="hero"><div class="page"><a class="back" href="vocabulary-hub.html">← Vocabulary Hub</a><h1>Lesson 1 · People and Places</h1><p>Тестовый словарь с сохранением прогресса.</p></div></div><main class="page"><div class="stats"><div class="stat"><div class="num" id="total">0</div><div class="lbl">Всего</div></div><div class="stat"><div class="num" id="learning">0</div><div class="lbl">Учу</div></div><div class="stat"><div class="num" id="known">0</div><div class="lbl">Знаю</div></div></div><div class="card"><div id="counter"></div><div class="word" id="word"></div><div class="ru" id="ru"></div></div><div class="btns"><button class="btn new" onclick="setS(0)">🔴 Новое</button><button class="btn learn" onclick="setS(1)">🟡 Учу</button><button class="btn known" onclick="setS(2)">🟢 Знаю</button></div><div class="navrow"><button class="small" onclick="prev()">← Назад</button><button class="small" onclick="next()">Дальше →</button></div></main><nav class="nav"><a href="index.html">🏠 Home</a><a href="grammar-hub.html">📖 Grammar</a><a href="homework.html">📝 HW</a><a class="active" href="vocabulary-hub.html">💥 Vocab</a></nav><script src="config.js"></script><script>
const LESSON='1';const C=window.APP_CONFIG,api=C.SB_URL+'/rest/v1',headers={apikey:C.SB_KEY,Authorization:'Bearer '+C.SB_KEY,'Content-Type':'application/json'};const WORDS=[['teacher','учитель'],['student','студент'],['city','город'],['country','страна'],['friend','друг'],['family','семья'],['job','работа'],['home','дом'],['school','школа'],['class','класс'],['name','имя'],['place','место']];let idx=0,status=JSON.parse(localStorage.getItem('milena_vocab_l1_status')||'{}');
function get(w){return Number(status[w]||0)}function render(){const w=WORDS[idx];counter.textContent=`${idx+1} / ${WORDS.length}`;word.textContent=w[0];ru.textContent=w[1];updateStats()}function updateStats(){total.textContent=WORDS.length;known.textContent=WORDS.filter(w=>get(w[0])===2).length;learning.textContent=WORDS.filter(w=>get(w[0])===1).length}function next(){idx=(idx+1)%WORDS.length;render()}function prev(){idx=(idx-1+WORDS.length)%WORDS.length;render()}function setS(v){status[WORDS[idx][0]]=v;localStorage.setItem('milena_vocab_l1_status',JSON.stringify(status));save();next()}async function save(){const knownN=WORDS.filter(w=>get(w[0])===2).length, learningN=WORDS.filter(w=>get(w[0])===1).length;try{const r=await fetch(`${api}/progress?student=eq.${C.STUDENT}&select=vocab_progress`,{headers});const row=(await r.json())[0]||{};const vp=row.vocab_progress||{};vp[LESSON]={known:knownN,learning:learningN,total:WORDS.length,statuses:status,updated_at:new Date().toISOString()};await fetch(`${api}/progress?on_conflict=student`,{method:'POST',headers:{...headers,Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({student:C.STUDENT,vocab_progress:vp,updated_at:new Date().toISOString()})})}catch(e){console.warn(e)}}render();
</script></body></html>
