<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Lesson 1 Homework — Milena</title><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"><style>
*{box-sizing:border-box;margin:0;padding:0}:root{--indigo:#4f46e5;--emerald:#10b981;--rose:#f43f5e;--bg:#f1f5f9;--border:#e2e8f0;--muted:#64748b}body{font-family:Inter,sans-serif;background:var(--bg);padding-bottom:100px}.top{position:sticky;top:0;z-index:20;background:#eff6ff;border-bottom:1.5px solid #bfdbfe;padding:13px 20px;display:flex;justify-content:center}.top-inner{max-width:760px;width:100%;display:flex;justify-content:space-between;align-items:center;gap:14px}.top b{color:#1d4ed8}.top a{background:#4f46e5;color:white;text-decoration:none;border-radius:12px;padding:10px 16px;font-weight:800}.hero{background:linear-gradient(135deg,#4f46e5,#8b5cf6);padding:34px 24px 48px;color:white}.page{max-width:760px;margin:0 auto;padding:0 20px}.back{color:rgba(255,255,255,.8);text-decoration:none;font-size:13px;font-weight:700}.hero h1{font-family:'Plus Jakarta Sans';font-size:clamp(26px,5vw,38px);margin-top:14px}.block{background:white;border:1.5px solid var(--border);border-radius:22px;padding:22px;margin:22px 0;box-shadow:0 2px 12px rgba(0,0,0,.05)}.label{font-size:11px;color:var(--muted);font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}.q{margin:14px 0;font-size:15px;line-height:1.7}.q input{border:1.5px solid var(--border);border-radius:10px;padding:8px 10px;font:inherit;width:160px}.q input.correct{background:#d1fae5;border-color:#6ee7b7}.q input.wrong{background:#ffe4e6;border-color:#fda4af}.fb{display:none;font-size:13px;margin-top:6px;color:#065f46;font-weight:700}.fb.show{display:block}.btn{width:100%;border:none;border-radius:14px;padding:15px;font-family:'Plus Jakarta Sans';font-size:15px;font-weight:800;color:white;background:linear-gradient(135deg,#10b981,#059669);cursor:pointer}.result{display:none;background:#d1fae5;color:#065f46;border:1.5px solid #6ee7b7;border-radius:18px;padding:18px;text-align:center;margin:18px 0;font-weight:800}.result.show{display:block}.nav{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0f172a;border-radius:100px;padding:12px 20px;display:flex;gap:4px}.nav a{color:rgba(255,255,255,.65);font-size:12px;font-weight:700;text-decoration:none;padding:7px 12px;border-radius:100px}.nav a.active,.nav a:hover{background:#4f46e5;color:white}@media(max-width:640px){.top-inner{flex-direction:column;align-items:flex-start}.nav{padding:10px}.nav a{padding:6px 8px}}
</style></head><body><div class="top"><div class="top-inner"><span>📚 <b>Сначала повтори слова</b> перед домашкой</span><a href="vocab-lesson1.html">Открыть словарь →</a></div></div><div class="hero"><div class="page"><a class="back" href="homework.html">← Homework</a><h1>Lesson 1 — People and Places</h1><p>Тестовая домашка для проверки логики отчёта.</p></div></div><main class="page"><section class="block"><div class="label">Exercise 1</div><div id="qs"></div><button class="btn" onclick="submitHomework()">Проверить и отправить отчёт</button></section><div class="result" id="result"></div></main><nav class="nav"><a href="index.html">🏠 Home</a><a href="grammar-hub.html">📖 Grammar</a><a class="active" href="homework.html">📝 HW</a><a href="vocabulary-hub.html">💥 Vocab</a></nav><script src="config.js"></script><script>
const LESSON='1';const C=window.APP_CONFIG,api=C.SB_URL+'/rest/v1',headers={apikey:C.SB_KEY,Authorization:'Bearer '+C.SB_KEY,'Content-Type':'application/json'};
const data=[['q1','I ___ Milena.','am'],['q2','She ___ from Spain.','is'],['q3','They ___ students.','are'],['q4','He ___ a sister.','has'],['q5','We ___ English on Mondays.','study']];
qs.innerHTML=data.map(([id,t])=>`<div class="q">${t.replace('___',`<input id="${id}" autocomplete="off">`)}<div class="fb" id="fb_${id}"></div></div>`).join('');
function norm(s){return(s||'').trim().toLowerCase().replace(/’/g,"'").replace(/\s+/g,' ')}
async function submitHomework(){let score=0,errors=[],answers={};data.forEach(([id,t,a])=>{const el=document.getElementById(id),fb=document.getElementById('fb_'+id),v=el.value;answers[id]=v;const ok=norm(v)===norm(a);el.className=ok?'correct':'wrong';fb.classList.add('show');fb.textContent=ok?'✓':'Правильно: '+a;if(ok)score++;else errors.push({question:t,answer:v||'нет ответа',correct:a})});const total=data.length,pct=Math.round(score/total*100),scoreText=`${score}/${total}`;result.classList.add('show');result.textContent=`Результат: ${scoreText} (${pct}%). Отчёт отправлен.`;await save(scoreText,score,total,pct,answers,errors);await telegram(scoreText,pct,errors)}
async function save(score_text,score,max_score,percent,answers,errors){const r=await fetch(`${api}/progress?student=eq.${C.STUDENT}&select=hw_scores,hw_answers`,{headers});const row=(await r.json())[0]||{};const scores=row.hw_scores||{}, ans=row.hw_answers||{};scores[LESSON]={score_text,score,max_score,percent,updated_at:new Date().toISOString()};ans[LESSON]={answers,errors};await fetch(`${api}/progress?on_conflict=student`,{method:'POST',headers:{...headers,Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({student:C.STUDENT,hw_scores:scores,hw_answers:ans,updated_at:new Date().toISOString()})})}
async function telegram(score,pct,errors){const text=`📝 Homework · ${C.STUDENT_NAME}\nLesson ${LESSON}\nРезультат: ${score} (${pct}%)\nОшибок: ${errors.length}`;try{await fetch(`https://api.telegram.org/bot${C.BOT_TOKEN}/sendMessage`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:C.CHAT_ID,text})})}catch(e){console.warn(e)}}
</script></body></html>
