<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Homework — Milena</title><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"><style>
*{box-sizing:border-box;margin:0;padding:0}:root{--indigo:#4f46e5;--rose:#f43f5e;--emerald:#10b981;--bg:#f1f5f9;--card:#fff;--border:#e2e8f0;--muted:#64748b;--dark:#0f172a}body{font-family:Inter,sans-serif;background:var(--bg);padding-bottom:110px}.hero{background:linear-gradient(135deg,#4f46e5,#7c3aed);padding:40px 24px 56px;color:white}.page{max-width:760px;margin:0 auto;padding:0 20px}.back{color:rgba(255,255,255,.8);text-decoration:none;font-size:13px;font-weight:700}.badge{display:inline-block;margin-top:18px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);border-radius:100px;padding:6px 14px;font-size:12px;font-weight:800}.hero h1{font-family:'Plus Jakarta Sans';font-size:clamp(28px,5vw,42px);margin-top:14px}.wave{line-height:0;background:var(--bg)}.wave svg{width:100%;display:block}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:26px 0}.stat{background:white;border:1.5px solid var(--border);border-radius:18px;padding:15px;text-align:center}.num{font-family:'Plus Jakarta Sans';font-size:24px;font-weight:800}.lbl{font-size:11px;color:var(--muted);font-weight:700}.section{font-size:11px;color:var(--muted);font-weight:800;letter-spacing:2px;text-transform:uppercase;margin:28px 0 14px}.list{display:flex;flex-direction:column;gap:14px}.card{background:white;border:1.5px solid var(--border);border-radius:20px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.05)}.main{padding:18px 20px;display:flex;gap:16px;align-items:center;text-decoration:none;color:inherit}.icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;background:#ede9fe}.info{flex:1}.lesson{font-size:11px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:1px}.title{font-family:'Plus Jakarta Sans';font-size:17px;font-weight:800;margin:4px 0}.meta{font-size:13px;color:var(--muted)}.pill{font-size:12px;font-weight:800;border-radius:100px;padding:5px 10px}.done{background:#d1fae5;color:#065f46}.todo{background:#ede9fe;color:#5b21b6}.strip{border-top:1px solid var(--border);padding:10px 20px;background:#fafbff;display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;font-size:13px;color:var(--muted)}.strip a{color:var(--rose);font-weight:800;text-decoration:none}.empty{background:white;border:1.5px dashed var(--border);border-radius:20px;padding:28px;text-align:center;color:var(--muted)}.nav{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0f172a;border-radius:100px;padding:12px 20px;display:flex;gap:4px}.nav a{color:rgba(255,255,255,.65);font-size:12px;font-weight:700;text-decoration:none;padding:7px 12px;border-radius:100px}.nav a.active,.nav a:hover{background:#4f46e5;color:white}@media(max-width:640px){.stats{grid-template-columns:1fr}.nav{padding:10px}.nav a{padding:6px 8px}}
</style></head><body><div class="hero"><div class="page"><a class="back" href="index.html">← На главную</a><br><div class="badge">📝 Homework Board</div><h1>Домашние задания</h1></div></div><div class="wave"><svg viewBox="0 0 1440 56" preserveAspectRatio="none"><path d="M0,56 C360,0 1080,0 1440,56 L1440,56 L0,56 Z" fill="#f1f5f9"/></svg></div><main class="page"><div class="stats"><div class="stat"><div class="num" id="doneNum">0</div><div class="lbl">Выполнено</div></div><div class="stat"><div class="num" id="todoNum">0</div><div class="lbl">Доступно</div></div><div class="stat"><div class="num" id="totalNum">0</div><div class="lbl">Всего</div></div></div><div id="doneBlock"><div class="section">✅ Выполнено</div><div class="list" id="doneList"></div></div><div class="section">✅ Доступно</div><div class="list" id="todoList"><div class="empty">Загружаю домашки…</div></div></main><nav class="nav"><a href="index.html">🏠 Home</a><a href="grammar-hub.html">📖 Grammar</a><a class="active" href="homework.html">📝 HW</a><a href="vocabulary-hub.html">💥 Vocab</a></nav><script src="config.js"></script><script>
const C=window.APP_CONFIG,api=C.SB_URL+'/rest/v1',headers={apikey:C.SB_KEY,Authorization:'Bearer '+C.SB_KEY};
function card(k,x,done,score){return `<div class="card"><a class="main" href="${x.homework_url}"><div class="icon">📝</div><div class="info"><div class="lesson">Lesson ${k}</div><div class="title">${x.title||'Homework'}</div><div class="meta">${done?'Результат: '+score:'Выполнить и отправить отчёт'}</div></div><span class="pill ${done?'done':'todo'}">${done?'✅ Сдано':'📝 Выполнить'}</span></a><div class="strip"><span>📖 Grammar: ${x.grammar_title||'—'} · 📚 Vocabulary: ${x.vocab_title||'—'}</span><span>${x.grammar_url?`<a href="${x.grammar_url}">Grammar</a>`:''} ${x.vocab_url?`<a href="${x.vocab_url}">Vocabulary</a>`:''}</span></div></div>`}
window.addEventListener('load',async()=>{try{const r=await fetch(`${api}/progress?student=eq.${C.STUDENT}&select=published_lessons,hw_scores`,{headers});const d=(await r.json())[0]||{};const lessons=d.published_lessons||{}, scores=d.hw_scores||{};const items=Object.entries(lessons).filter(([_,x])=>x&&x.published!==false&&x.homework_url).sort((a,b)=>Number(a[0])-Number(b[0]));const done=items.filter(([k])=>scores[k]);const todo=items.filter(([k])=>!scores[k]);doneNum.textContent=done.length;todoNum.textContent=todo.length;totalNum.textContent=items.length;doneBlock.style.display=done.length?'':'none';doneList.innerHTML=done.map(([k,x])=>card(k,x,true,scores[k].score_text||scores[k])).join('');todoList.innerHTML=todo.length?todo.map(([k,x])=>card(k,x,false,'')).join(''):'<div class="empty">Все доступные домашки выполнены.</div>'}catch(e){todoList.innerHTML='<div class="empty">Не удалось загрузить Supabase. Проверь config.js.</div>'}});
</script></body></html>
