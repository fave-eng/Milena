<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Publish Lesson — Milena</title><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"><style>
*{box-sizing:border-box;margin:0;padding:0}:root{--indigo:#4f46e5;--violet:#8b5cf6;--emerald:#10b981;--rose:#f43f5e;--bg:#f1f5f9;--border:#e2e8f0;--muted:#64748b}body{font-family:Inter,sans-serif;background:var(--bg);padding-bottom:70px;color:#0f172a}.hero{background:linear-gradient(135deg,#4f46e5,#8b5cf6);padding:38px 24px 50px;color:white}.page{max-width:800px;margin:0 auto;padding:0 20px}.hero h1{font-family:'Plus Jakarta Sans',sans-serif;font-size:36px}.hero p{opacity:.84;margin-top:6px}.card{background:white;border:1.5px solid var(--border);border-radius:22px;padding:24px;margin-top:24px}label{display:block;font-size:12px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin:14px 0 7px}input,textarea{width:100%;border:1.5px solid var(--border);border-radius:12px;padding:12px;font:inherit}textarea{min-height:110px}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.btn{width:100%;border:none;border-radius:14px;padding:15px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;color:white;background:linear-gradient(135deg,#4f46e5,#8b5cf6);margin-top:16px;cursor:pointer}.status{display:none;margin-top:14px;padding:14px;border-radius:14px;font-weight:800}.ok{display:block;background:#d1fae5;color:#065f46}.err{display:block;background:#ffe4e6;color:#9f1239}.warn{background:#fffbeb;border:1.5px solid #fde68a;color:#92400e;border-radius:14px;padding:12px;font-size:13px;line-height:1.5}@media(max-width:640px){.row{grid-template-columns:1fr}}</style></head><body><div class="hero"><div class="page"><h1>Публикация урока</h1><p>Урок автоматически появится в нужных хабах и счётчиках.</p></div></div><main class="page"><div class="card"><div class="warn">Если поле Grammar URL оставить пустым, урок появится только в Vocabulary и Homework. Это удобно, пока грамматика ещё не готова.</div><div class="row"><div><label>Lesson</label><input id="lesson" value="1"></div><div><label>Emoji</label><input id="emoji" value="💼"></div></div><label>Название урока</label><input id="title" value="Jobs"><div class="row"><div><label>Grammar URL</label><input id="grammarUrl" value=""></div><div><label>Grammar title</label><input id="grammarTitle" value=""></div></div><div class="row"><div><label>Vocabulary URL</label><input id="vocabUrl" value="vocab-lesson1.html"></div><div><label>Vocabulary title</label><input id="vocabTitle" value="Jobs"></div></div><div class="row"><div><label>Vocab total</label><input id="vocabTotal" value="44"></div><div><label>Homework URL</label><input id="homeworkUrl" value="lesson1.html"></div></div><label>Telegram message</label><textarea id="message"></textarea><button class="btn" onclick="buildMessage()">Обновить сообщение</button><button class="btn" onclick="publishLesson()">📲 Опубликовать урок</button><div id="status" class="status"></div></div></main><script src="config.js"></script><script>
const C=window.APP_CONFIG,api=C.SB_URL+'/rest/v1',headers={apikey:C.SB_KEY,Authorization:'Bearer '+C.SB_KEY,'Content-Type':'application/json'};const $=id=>document.getElementById(id);function show(t,m){status.className='status '+(t==='ok'?'ok':'err');status.textContent=m}
function buildMessage(){const lines=[`${$('emoji').value} ${C.STUDENT_NAME}, открыт новый урок!`,``,`Lesson ${$('lesson').value} — ${$('title').value}`];if($('grammarUrl').value.trim())lines.push(`📖 Grammar: ${$('grammarUrl').value.trim()}`);if($('vocabUrl').value.trim())lines.push(`📚 Vocabulary: ${$('vocabUrl').value.trim()}`);if($('homeworkUrl').value.trim())lines.push(`📝 Homework: ${$('homeworkUrl').value.trim()}`);lines.push(``,`Рекомендую сначала повторить слова, а потом перейти к заданиям ❤️`);message.value=lines.join('\n')}
async function publishLesson(){try{const lesson=$('lesson').value.trim();const r=await fetch(`${api}/progress?student=eq.${C.STUDENT}&select=published_lessons,homework_notifications`,{headers});const row=(await r.json())[0]||{};const published=row.published_lessons||{}, notes=row.homework_notifications||{};published[lesson]={lesson,title:$('title').value.trim(),emoji:$('emoji').value.trim(),grammar_url:$('grammarUrl').value.trim(),grammar_title:$('grammarTitle').value.trim(),vocab_url:$('vocabUrl').value.trim(),vocab_title:$('vocabTitle').value.trim(),vocab_total:Number($('vocabTotal').value||0),homework_url:$('homeworkUrl').value.trim(),published:true,published_at:new Date().toISOString()};await fetch(`${api}/progress?on_conflict=student`,{method:'POST',headers:{...headers,Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({student:C.STUDENT,published_lessons:published,homework_notifications:notes,updated_at:new Date().toISOString()})});if(!notes[lesson]?.telegram_sent){await sendTelegram(message.value);notes[lesson]={telegram_sent:true,sent_at:new Date().toISOString()};await fetch(`${api}/progress?on_conflict=student`,{method:'POST',headers:{...headers,Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({student:C.STUDENT,published_lessons:published,homework_notifications:notes,updated_at:new Date().toISOString()})});show('ok','Урок опубликован, Telegram отправлен.')}else show('ok','Урок обновлён. Telegram уже отправлялся раньше.')}catch(e){console.error(e);show('err',e.message||String(e))}}
async function sendTelegram(text){if(!text.trim())return;const r=await fetch(`https://api.telegram.org/bot${C.BOT_TOKEN}/sendMessage`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:C.CHAT_ID,text})});const d=await r.json().catch(()=>({}));if(!r.ok||!d.ok)throw new Error('Telegram error '+JSON.stringify(d))}buildMessage();
</script></body></html>
