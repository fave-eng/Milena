<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Vocabulary Hub — Milena</title><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"><style>
*{box-sizing:border-box;margin:0;padding:0}:root{--indigo:#4f46e5;--violet:#8b5cf6;--rose:#f43f5e;--emerald:#10b981;--amber:#f59e0b;--sky:#0ea5e9;--dark:#0f172a;--bg:#f1f5f9;--card:#fff;--muted:#64748b;--border:#e2e8f0}body{font-family:Inter,sans-serif;background:var(--bg);color:#0f172a;padding-bottom:110px;min-height:100vh}.hero{padding:44px 24px 56px;color:white;position:relative;overflow:hidden}.hero:before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.15) 1px,transparent 1px);background-size:28px 28px}.page{max-width:780px;margin:0 auto;padding:0 20px}.hero .page{position:relative;z-index:1}.back{color:rgba(255,255,255,.8);text-decoration:none;font-size:13px;font-weight:700}.badge{display:inline-flex;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);border-radius:100px;padding:6px 14px;font-size:12px;font-weight:800;margin-top:18px;margin-bottom:14px}.hero h1{font-family:'Plus Jakarta Sans',sans-serif;font-size:clamp(30px,6vw,46px);font-weight:800}.hero p{opacity:.84;margin-top:8px;line-height:1.55;max-width:620px}.wave{background:var(--bg);line-height:0}.wave svg{width:100%;display:block}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:26px 0}.stat{background:white;border:1.5px solid var(--border);border-radius:20px;padding:16px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.05)}.num{font-family:'Plus Jakarta Sans',sans-serif;font-size:26px;font-weight:800}.lbl{font-size:11px;color:var(--muted);font-weight:700;margin-top:2px}.section{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:28px 0 14px}.empty{background:white;border:1.5px dashed var(--border);border-radius:22px;padding:28px;text-align:center;color:var(--muted);line-height:1.55}.nav{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0f172a;border-radius:100px;padding:12px 20px;display:flex;gap:4px;box-shadow:0 8px 32px rgba(15,23,42,.3);z-index:100}.nav a{color:rgba(255,255,255,.65);font-size:12px;font-weight:700;text-decoration:none;padding:7px 12px;border-radius:100px;white-space:nowrap}.nav a.active,.nav a:hover{background:var(--indigo);color:white}@media(max-width:680px){.stats{grid-template-columns:1fr}.nav{padding:10px}.nav a{padding:6px 8px}}
.hero{background:linear-gradient(135deg,#f43f5e,#ec4899,#8b5cf6)}.tracker{background:#0f172a;color:white;border-radius:22px;padding:22px;margin:26px 0;box-shadow:0 8px 28px rgba(15,23,42,.18)}.tracker h3{font-family:'Plus Jakarta Sans',sans-serif}.trow{display:flex;justify-content:space-between;font-size:13px;color:rgba(255,255,255,.7);margin:12px 0 7px}.track{height:7px;background:rgba(255,255,255,.12);border-radius:100px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,#f43f5e,#8b5cf6);width:0;transition:.5s}.list{display:flex;flex-direction:column;gap:14px}.card{display:block;text-decoration:none;color:inherit;background:white;border:1.5px solid var(--border);border-radius:20px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.05)}.main{padding:18px 20px;display:flex;gap:16px;align-items:center}.icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;background:#fff1f2;flex-shrink:0}.info{flex:1;min-width:0}.lesson{font-size:11px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:1px}.title{font-family:'Plus Jakarta Sans',sans-serif;font-size:17px;font-weight:800;margin:4px 0}.meta{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted)}.bar{flex:1;max-width:130px;background:#e2e8f0;height:6px;border-radius:100px;overflow:hidden}.bar span{display:block;height:100%;background:linear-gradient(90deg,#f43f5e,#8b5cf6)}@media(max-width:520px){.meta{align-items:flex-start;flex-direction:column;gap:6px}.bar{width:100%;max-width:none}}
</style></head><body><div class="hero"><div class="page"><a class="back" href="index.html">← На главную</a><br><div class="badge">💥 Vocabulary Hub</div><h1>Vocabulary</h1><p>Рекомендую сначала повторить слова: слушай произношение, отмечай сложные и возвращайся к ним перед домашней работой 💫</p></div></div><div class="wave"><svg viewBox="0 0 1440 56" preserveAspectRatio="none"><path d="M0,56 C360,0 1080,0 1440,56 L1440,56 L0,56 Z" fill="#f1f5f9"/></svg></div><main class="page"><div class="tracker"><h3>📊 Твой прогресс</h3><div class="trow"><span>Выучено</span><span id="totalLabel">0 / 0 слов</span></div><div class="track"><div class="fill" id="totalBar"></div></div></div><div class="stats"><div class="stat"><div class="num" id="knownNum">0</div><div class="lbl">Знаю</div></div><div class="stat"><div class="num" id="learningNum">0</div><div class="lbl">Учу</div></div><div class="stat"><div class="num" id="totalNum">0</div><div class="lbl">Всего слов</div></div></div><div class="section">Твои словари</div><div class="list" id="list"><div class="empty">Загружаю словари…</div></div></main><nav class="nav"><a href="index.html">🏠 Home</a><a href="grammar-hub.html">📖 Grammar</a><a href="homework.html">📝 HW</a><a class="active" href="vocabulary-hub.html">💥 Vocab</a></nav><script src="config.js"></script><script>
const C=window.APP_CONFIG||{},api=C.SB_URL?C.SB_URL+'/rest/v1':'',headers=C.SB_KEY?{apikey:C.SB_KEY,Authorization:'Bearer '+C.SB_KEY}:{};
function itemsFrom(d){return Object.entries((d&&d.published_lessons)||{}).filter(([_,x])=>x&&x.published!==false&&x.vocab_url).sort((a,b)=>Number(a[0])-Number(b[0]))}
function progVal(p,k,field){const x=p[k];if(!x)return 0;if(typeof x==='object')return Number(x[field]||0);return field==='known'?Number(x||0):0}
function reset(){knownNum.textContent=0;learningNum.textContent=0;totalNum.textContent=0;totalLabel.textContent='0 / 0 слов';totalBar.style.width='0%';list.innerHTML='<div class="empty">Скоро здесь появятся словари к урокам.</div>'}
window.addEventListener('load',async()=>{reset();if(!api||!C.STUDENT)return;try{const r=await fetch(`${api}/progress?student=eq.${C.STUDENT}&select=published_lessons,vocab_progress`,{headers});const d=(await r.json())[0]||{};const prog=d.vocab_progress||{},items=itemsFrom(d);let known=0,learning=0,total=0;items.forEach(([k,x])=>{known+=progVal(prog,k,'known');learning+=progVal(prog,k,'learning');total+=Number(x.vocab_total||0)});knownNum.textContent=known;learningNum.textContent=learning;totalNum.textContent=total;totalLabel.textContent=`${known} / ${total} слов`;totalBar.style.width=(total?Math.round(known/total*100):0)+'%';if(!items.length){list.innerHTML='<div class="empty">Скоро здесь появятся словари к урокам.</div>';return}list.innerHTML=items.map(([k,x])=>{const kn=progVal(prog,k,'known'),lr=progVal(prog,k,'learning'),tt=Number(x.vocab_total||0),pc=tt?Math.round(kn/tt*100):0;return `<a class="card" href="${x.vocab_url}"><div class="main"><div class="icon">💥</div><div class="info"><div class="lesson">Lesson ${k}</div><div class="title">${x.vocab_title||x.title||'Vocabulary'}</div><div class="meta"><span>${kn} / ${tt} слов · учу: ${lr}</span><div class="bar"><span style="width:${pc}%"></span></div><b>${pc}%</b></div></div>→</div></a>`}).join('')}catch(e){list.innerHTML='<div class="empty">Не удалось загрузить данные. Проверь config.js и Supabase.</div>';console.warn(e)}});
</script></body></html>
